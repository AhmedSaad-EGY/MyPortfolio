<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Ahmed Saad favicon</title>
  <desc id="desc">A gradient circle with the initials AS</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#44d4ff"/>
      <stop offset="100%" stop-color="#ff9f44"/>
    </linearGradient>
  </defs>
  <circle cx="128" cy="128" r="112" fill="url(#bg)"/>
  <circle cx="128" cy="128" r="112" fill="none" stroke="rgba(8,13,24,0.2)" stroke-width="8"/>
  <text x="128" y="146" text-anchor="middle" font-family="Chakra Petch, Segoe UI, sans-serif"
    font-size="96" font-weight="700" fill="#081018">AS</text>
